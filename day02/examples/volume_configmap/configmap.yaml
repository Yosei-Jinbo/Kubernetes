apiVersion: v1
kind: ConfigMap
metadata:
  name: game-demo
#ConfigMapはdata:の直下を環境変数として利用できるようにする
data:
  player_initial_lives: "3"
  ui_properties_file_name: "user-interface.properties"
  #<環境変数名>: | とすることで複数環境変数を一気に選択できる
  game.properties: |
    enemy.types=aliens,monsters
    player.maximum-lives=5
  user-interface.properties: |
    color.good=purple
    color.bad=yellow
    allow.textmode=true