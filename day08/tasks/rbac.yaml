apiVersion: v1
kind: ServiceAccount #PodがKubernetes APIをたたくための「アカウント」(Podが認証を受けるためのもの)
metadata:
  name: my-scheduler
  namespace: kube-system
---
#RBAC: Role-Based Access Control(役割ベースのアクセス制御)。「誰が・何に・何をしてよいか」を定義する仕組み
#┌──────────────────────────────────┬──────────────────────────────────────────────────────────┐
#│             リソース             │                           役割                           │
#├──────────────────────────────────┼──────────────────────────────────────────────────────────┤
#│ Role / ClusterRole               │ 「何にどんな操作ができるか」のルール定義（権限のセット） │
#├──────────────────────────────────┼──────────────────────────────────────────────────────────┤
#│ RoleBinding / ClusterRoleBinding │ Role を ServiceAccount(やユーザー)に付与する             │
#└──────────────────────────────────┴──────────────────────────────────────────────────────────┘
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-scheduler-as-kube-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-scheduler       # 既存のClusterRoleをそのまま流用
subjects:
- kind: ServiceAccount
  name: my-scheduler
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: my-scheduler-as-volume-scheduler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:volume-scheduler
subjects:
- kind: ServiceAccount
  name: my-scheduler
  namespace: kube-system
---
# Leaseリソースへの書き込み権限(リーダー選出用)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: my-scheduler-leader-election
  namespace: kube-system
rules:
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create", "get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: my-scheduler-leader-election
  namespace: kube-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: my-scheduler-leader-election
subjects:
- kind: ServiceAccount
  name: my-scheduler
  namespace: kube-system