apiVersion: v1
kind: Pod
metadata:
  name: pod-resources-demo
  namespace: pod-resources-example
spec:
  #Podにresourcesの項目がある(Pod全体の予算を決めてその予算の中で各コンテナが動的にリソースを奪い合える)
  resources:
    limits:
      cpu: "1" #1000mと同値
      memory: "200Mi"
    requests:
      cpu: "1"
      memory: "100Mi"
  containers:
  - name: pod-resources-dem-ctr-1
    image: nginx
    #コンテナに割り当てるresources
    resources:
      limits:
        cpu: "0.5"
        memory: "100Mi"
      requests:
        cpu: "0.5"
        memory: "50Mi"
  - name: pod-resources-demo-ctr-2
    image: fedora
    command:
      - sleep
      - inf